---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.description %}
      <p class="post-description">{{ page.description }}</p>
    {% endif %}
    <p class="post-meta">
      {% if page.date %}<time>{{ page.date | date: "%B %d, %Y" }}</time>{% endif %}
      {% if page.tags.size > 0 %} &middot; {{ page.tags | join: ", " }}{% endif %}
    </p>
  </header>

  <div class="ql-tabs">
    <button class="ql-tab-btn active" onclick="showTab('intro', this)">Concept</button>
    <button class="ql-tab-btn" onclick="showTab('python', this)">Python</button>
    <button class="ql-tab-btn" onclick="showTab('csharp', this)">C#</button>
    <button class="ql-tab-btn" onclick="showTab('cpp', this)">C++</button>
    <button class="ql-tab-btn" onclick="showTab('rust', this)">Rust</button>
    <button class="ql-tab-btn" onclick="showTab('go', this)">Go</button>
    <button class="ql-tab-btn" onclick="showTab('ts', this)">TypeScript</button>
    <button class="ql-tab-btn" onclick="showTab('compare', this)">Compare</button>
  </div>

  {{ content }}

</article>

<style>
.ql-tabs {
  display: flex;
  gap: 4px;
  margin: 24px 0 0 0;
  border-bottom: 2px solid #e8e8e8;
}
.ql-tab-btn {
  padding: 8px 20px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 0.95rem;
  color: #555;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  font-family: inherit;
}
.ql-tab-btn.active {
  color: #2a7ae2;
  border-bottom: 2px solid #2a7ae2;
  font-weight: 600;
}
.ql-tab-content {
  padding: 24px 0;
}
.lang-badges {
  display: flex;
  gap: 0.5em;
  flex-wrap: wrap;
  margin-bottom: 1.2em;
}
.lang-badges span {
  font-size: 13px;
  font-weight: bold;
  padding: 0.2em 0.7em;
  border-radius: 3px;
}
.badge-py  { background: #3572A5; color: #fff; }
.badge-cs  { background: #178600; color: #fff; }
.badge-cpp { background: #c0392b; color: #fff; }
.badge-rs  { background: #dea584; color: #000; }
.badge-go  { background: #00ADD8; color: #fff; }
.badge-ts  { background: #3178C6; color: #fff; }
.compare-table { width: 100%; border-collapse: collapse; margin: 1em 0; font-size: 14px; }
.compare-table th, .compare-table td { padding: 8px 12px; border: 1px solid #e8e8e8; text-align: center; }
.compare-table th { background: #f8f8f8; font-weight: 600; font-size: 13px; }
.compare-table td:first-child { text-align: left; font-weight: 500; }
.compare-table .star { color: #f0883e; }
.cpp-note {
  border-left: 4px solid #e8e8e8;
  padding: 6px 14px;
  font-size: 14px;
  color: #828282;
  margin: 4px 0 20px;
}
.cpp-note code {
  background: #eef;
  border: 1px solid #e8e8e8;
  border-radius: 3px;
  padding: 1px 4px;
  font-size: 13px;
  color: #111;
}
</style>

<script>
function showTab(name, btn) {
  document.querySelectorAll('.ql-tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.ql-tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).style.display = 'block';
  btn.classList.add('active');
}
</script>

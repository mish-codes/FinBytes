---
layout: page
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.description %}
      <p class="post-description">{{ page.description }}</p>
    {% endif %}
    <p class="post-meta">
      {% if page.date %}<time>{{ page.date | date: "%B %d, %Y" }}</time>{% endif %}
      {% if page.tags.size > 0 %} &middot; {{ page.tags | join: ", " }}{% endif %}
    </p>
  </header>

  <div class="ql-tabs">
    <button class="ql-tab-btn active" onclick="showTab('brief', this)">Overview</button>
    <button class="ql-tab-btn" onclick="showTab('exercises', this)">Learning Path</button>
    <button class="ql-tab-btn" onclick="showTab('math', this)">Risk Theory</button>
    <button class="ql-tab-btn" onclick="showTab('core', this)">Code Walkthrough</button>
    <button class="ql-tab-btn" onclick="showTab('infra', this)">API &amp; Database</button>
    <button class="ql-tab-btn" onclick="showTab('arch', this)">Architecture</button>
    <button class="ql-tab-btn" onclick="showTab('run', this)">Live Demo</button>
    <button class="ql-tab-btn" onclick="showTab('health', this)">Status</button>
    <button class="ql-tab-btn" onclick="showTab('explained', this)">Explained</button>
  </div>

  {{ content }}

</article>

<style>
.ql-tabs {
  display: flex;
  gap: 4px;
  margin: 24px 0 0 0;
  border-bottom: 2px solid #e8e8e8;
  flex-wrap: wrap;
}
.ql-tab-btn {
  padding: 8px 16px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 0.9rem;
  color: #555;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
}
.ql-tab-btn.active {
  color: #2a7ae2;
  border-bottom: 2px solid #2a7ae2;
  font-weight: 600;
}
.ql-tab-content {
  padding: 24px 0;
}
</style>

<script>
function showTab(name, btn) {
  document.querySelectorAll('.ql-tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.ql-tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).style.display = 'block';
  btn.classList.add('active');
}
</script>

---
layout: page
title: Sitemap
icon: fas fa-project-diagram
order: 0
permalink: /
---

<style>
#panel-wrapper { display: none !important; }
#main-wrapper > .row > .col-xl-9 { max-width: 100% !important; flex: 0 0 100% !important; }
#main-wrapper { margin-top: 0 !important; padding-top: 0 !important; padding-left: 0 !important; padding-right: 0 !important; }
#main-wrapper .container { max-width: 100% !important; padding: 0 !important; }
main.col-12 { padding: 0 !important; }
.content { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
.px-1 { padding: 0 !important; }
#sidebar { transform: translateX(-100%); transition: transform 0.3s ease; z-index: 1100; }
#sidebar:hover { transform: translateX(0); }
.dynamic-title { display: none !important; }
.row { margin: 0 !important; }
#tail-wrapper { display: none !important; }
.graph-lede {
  color: var(--text-muted-color, #666);
  font-size: .95rem;
  margin-bottom: .5rem;
  max-width: 580px;
  line-height: 1.7;
}
.graph-links {
  display: flex;
  gap: 1.2rem;
  margin-bottom: .75rem;
  font-size: .8rem;
}
.graph-links a {
  color: var(--text-muted-color, #888);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: .3rem;
}
.graph-links a:hover { color: var(--link-color, #2a7ae2); }
.graph-container {
  width: 100%;
  height: calc(100vh - 80px);
  min-height: 600px;
  border: none;
  overflow: hidden;
  background: var(--main-bg, #fff);
  position: relative;
}
.graph-container svg { width: 100%; height: 100%; }
.graph-tooltip {
  position: absolute;
  padding: 6px 10px;
  background: var(--card-bg, #fff);
  border: 1px solid var(--border-color, #ddd);
  border-radius: 4px;
  font-size: .82rem;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  max-width: 280px;
  z-index: 10;
}
.graph-controls {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: .5rem;
}
.graph-reset {
  font-size: .78rem;
  padding: 3px 10px;
  border: 1px solid var(--border-color, #ddd);
  border-radius: 4px;
  background: var(--card-bg, #fff);
  color: var(--text-color, #333);
  cursor: pointer;
  display: none;
}
.graph-reset:hover { background: var(--border-color, #eee); }
.graph-breadcrumb {
  font-size: .78rem;
  color: var(--text-muted-color, #888);
}
.graph-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  margin-top: .5rem;
  font-size: .78rem;
  color: var(--text-muted-color, #888);
}
.graph-legend-item { display: flex; align-items: center; gap: .35rem; }
.graph-legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
</style>

<p class="graph-lede">Explore FinBytes &mdash; click a section to expand, click a post to see related, double-click to open.</p>

<div class="graph-links">
  <a href="https://github.com/mish-codes" target="_blank"><i class="fab fa-github"></i> GitHub</a>
  <a href="https://finbytes.streamlit.app" target="_blank"><i class="fas fa-play-circle"></i> Demo</a>
  <a href="{{ "/about/" | relative_url }}"><i class="fas fa-info-circle"></i> About</a>
</div>

<div class="graph-controls">
  <button class="graph-reset" id="resetBtn" onclick="window._graphReset()">Reset</button>
  <span class="graph-breadcrumb" id="breadcrumb"></span>
</div>

<div class="graph-container" id="graph" style="width:100%;height:calc(100vh - 80px);min-height:600px;"></div>
<div class="graph-tooltip" id="tooltip"></div>

<div class="graph-legend">
  <span class="graph-legend-item"><span class="graph-legend-dot" style="background:#4a90d9"></span> Python</span>
  <span class="graph-legend-item"><span class="graph-legend-dot" style="background:#2ea043"></span> Tech Stack</span>
  <span class="graph-legend-item"><span class="graph-legend-dot" style="background:#e8893c"></span> Math / Finance</span>
  <span class="graph-legend-item"><span class="graph-legend-dot" style="background:#a371f7"></span> Comparisons</span>
  <span class="graph-legend-item"><span class="graph-legend-dot" style="background:#e24a4a"></span> Quant Lab</span>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(function() {
  var rawPosts = [
    {% for post in site.posts %}
    { id: "post-{{ forloop.index }}", title: {{ post.title | jsonify }}, url: "{{ post.url | relative_url }}", tags: {{ post.tags | jsonify }}, section: {{ post.section | default: "" | jsonify }}, permalink: {{ post.permalink | default: post.url | jsonify }} }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
  var rawProjects = [
    {% for p in site.quant_lab %}
    { id: "ql-{{ forloop.index }}", title: {{ p.title | jsonify }}, url: "{{ p.url | relative_url }}", tags: [{% for t in p.tech %}"{{ t | downcase }}"{% unless forloop.last %},{% endunless %}{% endfor %}], section: "quant-lab", permalink: {{ p.permalink | default: p.url | jsonify }} }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  var colorMap = { "python": "#4a90d9", "tech-stack": "#2ea043", "math-finance": "#e8893c", "comparisons": "#a371f7", "quant-lab": "#e24a4a" };
  var sectionLabels = { "python": "Python", "tech-stack": "Tech Stack", "math-finance": "Math / Finance", "comparisons": "Comparisons", "quant-lab": "Quant Lab" };

  function getSection(p) {
    if (p.section === "math-finance" || p.permalink.indexOf("/math-finance") === 0) return "math-finance";
    if (p.section === "comparisons" || p.permalink.indexOf("/comparisons") === 0) return "comparisons";
    if (p.permalink.indexOf("/quant-lab") === 0) return "quant-lab";
    if (p.permalink.indexOf("/tech-stack") === 0) return "tech-stack";
    if (p.permalink.indexOf("/python") === 0) return "python";
    if (p.section === "infrastructure") return "tech-stack";
    if (p.section === "testing" || p.section === "python") return "python";
    return "python";
  }

  var allPosts = rawPosts.concat(rawProjects).map(function(p) {
    var sec = getSection(p);
    return { id: p.id, title: p.title, url: p.url, section: sec, tags: (p.tags || []).map(function(t) { return t.toLowerCase(); }), color: colorMap[sec] || "#999" };
  });

  var postsBySection = {};
  allPosts.forEach(function(p) { if (!postsBySection[p.section]) postsBySection[p.section] = []; postsBySection[p.section].push(p); });

  var container = document.getElementById("graph");
  var tooltip = document.getElementById("tooltip");
  var resetBtn = document.getElementById("resetBtn");
  var breadcrumb = document.getElementById("breadcrumb");
  var svg, g, simulation, width, height, rotateTimer = null;
  var expandedSection = null, expandedPost = null, clickTimer = null;

  function showTooltip(event, text) {
    tooltip.style.opacity = 1; tooltip.textContent = text;
    tooltip.style.left = (event.pageX + 12) + "px"; tooltip.style.top = (event.pageY - 10) + "px";
  }
  function hideTooltip() { tooltip.style.opacity = 0; }

  function findRelated(post) {
    var related = [];
    allPosts.forEach(function(p) { if (p.id === post.id) return; var sh = post.tags.filter(function(t) { return p.tags.indexOf(t) >= 0; }); if (sh.length >= 3) related.push({ post: p, weight: sh.length }); });
    related.sort(function(a, b) { return b.weight - a.weight; });
    return related.slice(0, 12);
  }

  function renderGraph(visibleNodes, visibleLinks, opts) {
    g.selectAll("*").remove();
    if (simulation) simulation.stop();
    var simNodes = visibleNodes.map(function(n) { return Object.assign({}, n); });
    var simLinks = visibleLinks.map(function(l) { return { source: l.source, target: l.target, weight: l.weight || 1 }; });

    simulation = d3.forceSimulation(simNodes)
      .force("link", d3.forceLink(simLinks).id(function(d) { return d.id; }).distance(opts.linkDist || 80).strength(0.4))
      .force("charge", d3.forceManyBody().strength(opts.charge || -200))
      .force("center", d3.forceCenter(width / 2, height / 2))
      .force("collision", d3.forceCollide().radius(function(d) { return d.radius + 8; }));

    var link = g.append("g").selectAll("line").data(simLinks).join("line")
      .attr("stroke", "var(--border-color, #ddd)").attr("stroke-opacity", 0.4)
      .attr("stroke-width", function(d) { return Math.min((d.weight || 1) * 0.5, 2); });

    var node = g.append("g").selectAll("g").data(simNodes).join("g").style("cursor", "pointer")
      .call(d3.drag()
        .on("start", function(ev, d) { if (!ev.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag", function(ev, d) { d.fx = ev.x; d.fy = ev.y; })
        .on("end", function(ev, d) { if (!ev.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

    node.append("circle").attr("r", function(d) { return d.radius; }).attr("fill", function(d) { return d.color; })
      .attr("stroke", "var(--main-bg, #fff)").attr("stroke-width", function(d) { return d.expanded ? 3 : 1.5; });

    if (opts.showLabels) {
      node.append("text")
        .text(function(d) {
          var t = d.label || d.title || "";
          return d.isSection ? t : (t.length > 30 ? t.substring(0, 28) + "\u2026" : t);
        })
        .attr("dx", function(d) { return d.radius + 4; }).attr("dy", ".35em")
        .attr("font-size", function(d) { return Math.max(13, width * 0.011) + "px"; })
        .attr("font-weight", function(d) { return d.isSection ? "700" : "400"; })
        .attr("fill", "var(--text-color, #333)")
        .style("pointer-events", "none");
    }

    node.on("mouseover", function(ev, d) {
      var hint = d.isSection ? d.label + " (" + (postsBySection[d.id] || []).length + " posts)" : d.title;
      showTooltip(ev, hint);
      d3.select(this).select("circle").attr("r", d.radius * 1.8).attr("stroke-width", 2.5);
      if (rotateTimer) { rotateTimer.stop(); rotateTimer = null; }
    }).on("mousemove", function(ev) {
      tooltip.style.left = (ev.pageX + 12) + "px"; tooltip.style.top = (ev.pageY - 10) + "px";
    }).on("mouseout", function(ev, d) {
      hideTooltip();
      d3.select(this).select("circle").attr("r", d.radius).attr("stroke-width", d.expanded ? 3 : 1.5);
      if (canRotate && !rotateTimer) { rotateTimer = d3.timer(function() { rotateAngle += 0.05; g.attr("transform", "rotate(" + rotateAngle + "," + (width / 2) + "," + (height / 2) + ")"); node.selectAll("text").attr("transform", "rotate(" + (-rotateAngle) + ")"); }); }
    }).on("click", function(ev, d) {
      if (d.isBack) { window._graphReset(); return; }
      if (expandedPost && !d.isSection) { window.location.href = d.url; return; }
      if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; return; }
      clickTimer = setTimeout(function() { clickTimer = null;
        if (d.isSection && d.expanded) { showTopLevel(); }
        else if (d.isSection) { expandSection(d.id); }
        else { expandPost(d); }
      }, 250);
    }).on("dblclick", function(ev, d) {
      if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
      if (!d.isSection) window.location.href = d.url;
    });

    if (rotateTimer) { rotateTimer.stop(); rotateTimer = null; }
    g.attr("transform", null);
    var rotateAngle = 0;
    var canRotate = (expandedSection !== null || expandedPost !== null);

    simulation.on("tick", function() {
      link.attr("x1", function(d) { return d.source.x; }).attr("y1", function(d) { return d.source.y; })
          .attr("x2", function(d) { return d.target.x; }).attr("y2", function(d) { return d.target.y; });
      node.attr("transform", function(d) { return "translate(" + d.x + "," + d.y + ")"; });
    });

    simulation.on("end", function() {
      if (!canRotate || rotateTimer) return;
      rotateTimer = d3.timer(function() {
        rotateAngle += 0.05;
        g.attr("transform", "rotate(" + rotateAngle + "," + (width / 2) + "," + (height / 2) + ")");
        node.selectAll("text").attr("transform", "rotate(" + (-rotateAngle) + ")");
      });
    });
  }

  function showTopLevel() {
    expandedSection = null; expandedPost = null;
    resetBtn.style.display = "none"; breadcrumb.textContent = "";
    var secR = Math.max(35, Math.min(55, width * 0.04));
    var sn = Object.keys(postsBySection).map(function(sec) {
      return { id: sec, title: sectionLabels[sec], label: sectionLabels[sec], color: colorMap[sec], radius: secR, isSection: true };
    });
    var sl = []; var sk = Object.keys(postsBySection);
    for (var i = 0; i < sk.length; i++) for (var j = i + 1; j < sk.length; j++) sl.push({ source: sk[i], target: sk[j], weight: 1 });
    var diag = Math.sqrt(width * width + height * height);
    renderGraph(sn, sl, { linkDist: diag * 0.2, charge: -diag * 0.8, showLabels: true });
  }

  function expandSection(sectionId) {
    expandedSection = sectionId; expandedPost = null;
    resetBtn.style.display = "inline-block"; breadcrumb.textContent = sectionLabels[sectionId];
    var cR = Math.max(25, Math.min(40, width * 0.025));
    var pR = Math.max(8, Math.min(14, width * 0.01));
    var oR = Math.max(16, Math.min(28, width * 0.018));
    var center = { id: sectionId, title: sectionLabels[sectionId], label: sectionLabels[sectionId], color: colorMap[sectionId], radius: cR, isSection: true, expanded: true };
    var children = (postsBySection[sectionId] || []).map(function(p) { return { id: p.id, title: p.title, url: p.url, section: p.section, tags: p.tags, color: p.color, radius: pR }; });
    var others = Object.keys(postsBySection).filter(function(s) { return s !== sectionId; }).map(function(sec) { return { id: sec, title: sectionLabels[sec], label: sectionLabels[sec], color: colorMap[sec], radius: oR, isSection: true }; });
    var all = [center].concat(children).concat(others);
    var links = []; children.forEach(function(c) { links.push({ source: sectionId, target: c.id, weight: 1 }); });
    var diag = Math.sqrt(width * width + height * height);
    var scale = Math.max(1, children.length / 10);
    renderGraph(all, links, { linkDist: diag * 0.06 * scale, charge: -diag * 0.2 * scale, showLabels: true });
  }

  function expandPost(post) {
    expandedPost = post;
    resetBtn.style.display = "inline-block";
    var secLabel = sectionLabels[expandedSection] || sectionLabels[post.section];
    breadcrumb.textContent = secLabel + " \u203a " + post.title;
    var cR = Math.max(16, Math.min(24, width * 0.016));
    var rR = Math.max(8, Math.min(14, width * 0.01));
    var center = { id: post.id, title: post.title, url: post.url, section: post.section, tags: post.tags, color: post.color, radius: cR, expanded: true };
    var related = findRelated(post);
    var rNodes = related.map(function(r) { return { id: r.post.id, title: r.post.title, url: r.post.url, section: r.post.section, tags: r.post.tags, color: r.post.color, radius: rR }; });
    var all = [center].concat(rNodes);
    var links = related.map(function(r) { return { source: post.id, target: r.post.id, weight: r.weight }; });
    var diag3 = Math.sqrt(width * width + height * height);
    var scale3 = Math.max(1, rNodes.length / 8);
    renderGraph(all, links, { linkDist: diag3 * 0.06 * scale3, charge: -diag3 * 0.2 * scale3, showLabels: true });
  }

  window._graphReset = function() {
    if (expandedPost && expandedSection) { expandSection(expandedSection); }
    else { showTopLevel(); }
  };

  function initGraph() {
    width = container.clientWidth || 800;
    height = container.clientHeight || 500;
    svg = d3.select("#graph").append("svg").attr("viewBox", [0, 0, width, height]);
    g = svg.append("g");
    svg.call(d3.zoom().scaleExtent([0.3, 4]).on("zoom", function(ev) { g.attr("transform", ev.transform); }));
    showTopLevel();
  }

  function tryInit() {
    if (container.clientWidth > 0 && container.clientHeight > 0) { initGraph(); }
    else { requestAnimationFrame(tryInit); }
  }
  tryInit();
})();
</script>

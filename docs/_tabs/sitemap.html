---
layout: page
title: Sitemap
icon: fas fa-project-diagram
order: 0
permalink: /
---

<style>
#panel-wrapper { display: none !important; }
#main-wrapper > .row > .col-xl-9 { max-width: 100% !important; flex: 0 0 100% !important; }
.graph-lede {
  color: var(--text-muted-color, #666);
  font-size: .95rem;
  margin-bottom: 1rem;
  max-width: 580px;
  line-height: 1.7;
}
.graph-container {
  width: 100%;
  height: 75vh;
  min-height: 450px;
  border: 1px solid var(--border-color, #e8e8e8);
  border-radius: 8px;
  overflow: hidden;
  background: var(--main-bg, #fff);
  position: relative;
}
.graph-container svg { width: 100%; height: 100%; }
.graph-tooltip {
  position: absolute;
  padding: 6px 10px;
  background: var(--card-bg, #fff);
  border: 1px solid var(--border-color, #ddd);
  border-radius: 4px;
  font-size: .82rem;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  max-width: 280px;
  z-index: 10;
}
.graph-controls {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: .75rem;
}
.graph-reset {
  font-size: .78rem;
  padding: 3px 10px;
  border: 1px solid var(--border-color, #ddd);
  border-radius: 4px;
  background: var(--card-bg, #fff);
  color: var(--text-color, #333);
  cursor: pointer;
  display: none;
}
.graph-reset:hover { background: var(--border-color, #eee); }
.graph-breadcrumb {
  font-size: .78rem;
  color: var(--text-muted-color, #888);
}
.graph-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  margin-top: 1rem;
  font-size: .78rem;
  color: var(--text-muted-color, #888);
}
.graph-legend-item { display: flex; align-items: center; gap: .35rem; }
.graph-legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
</style>

<p class="graph-lede">Explore FinBytes &mdash; click a section to expand, click a post to see related, double-click to open.</p>

<div class="graph-controls">
  <button class="graph-reset" id="resetBtn" onclick="window._graphReset()">Reset</button>
  <span class="graph-breadcrumb" id="breadcrumb"></span>
</div>

<div class="graph-container" id="graph" style="width:100%;height:75vh;min-height:450px;"></div>
<div class="graph-tooltip" id="tooltip"></div>

<div class="graph-legend">
  <span class="graph-legend-item"><span class="graph-legend-dot" style="background:#4a90d9"></span> Python</span>
  <span class="graph-legend-item"><span class="graph-legend-dot" style="background:#2ea043"></span> Tech Stack</span>
  <span class="graph-legend-item"><span class="graph-legend-dot" style="background:#e8893c"></span> Math / Finance</span>
  <span class="graph-legend-item"><span class="graph-legend-dot" style="background:#a371f7"></span> Comparisons</span>
  <span class="graph-legend-item"><span class="graph-legend-dot" style="background:#e24a4a"></span> Quant Lab</span>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(function() {
  var rawPosts = [
    {% for post in site.posts %}
    {
      id: "post-{{ forloop.index }}",
      title: {{ post.title | jsonify }},
      url: "{{ post.url | relative_url }}",
      tags: {{ post.tags | jsonify }},
      section: {{ post.section | default: "" | jsonify }},
      permalink: {{ post.permalink | default: post.url | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  var rawProjects = [
    {% for p in site.quant_lab %}
    {
      id: "ql-{{ forloop.index }}",
      title: {{ p.title | jsonify }},
      url: "{{ p.url | relative_url }}",
      tags: [{% for t in p.tech %}"{{ t | downcase }}"{% unless forloop.last %},{% endunless %}{% endfor %}],
      section: "quant-lab",
      permalink: {{ p.permalink | default: p.url | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  function getSection(p) {
    if (p.section === "math-finance" || p.permalink.indexOf("/math-finance") === 0) return "math-finance";
    if (p.section === "comparisons" || p.permalink.indexOf("/comparisons") === 0) return "comparisons";
    if (p.permalink.indexOf("/quant-lab") === 0) return "quant-lab";
    if (p.permalink.indexOf("/tech-stack") === 0) return "tech-stack";
    if (p.permalink.indexOf("/python") === 0) return "python";
    if (p.section === "infrastructure") return "tech-stack";
    if (p.section === "testing" || p.section === "python") return "python";
    return "python";
  }

  var colorMap = {
    "python": "#4a90d9",
    "tech-stack": "#2ea043",
    "math-finance": "#e8893c",
    "comparisons": "#a371f7",
    "quant-lab": "#e24a4a"
  };

  var sectionLabels = {
    "python": "Python",
    "tech-stack": "Tech Stack",
    "math-finance": "Math / Finance",
    "comparisons": "Comparisons",
    "quant-lab": "Quant Lab"
  };

  var allPosts = rawPosts.concat(rawProjects).map(function(p) {
    var sec = getSection(p);
    return {
      id: p.id,
      title: p.title,
      url: p.url,
      section: sec,
      tags: (p.tags || []).map(function(t) { return t.toLowerCase(); }),
      color: colorMap[sec] || "#999"
    };
  });

  var postsBySection = {};
  allPosts.forEach(function(p) {
    if (!postsBySection[p.section]) postsBySection[p.section] = [];
    postsBySection[p.section].push(p);
  });

  var container = document.getElementById("graph");
  var tooltip = document.getElementById("tooltip");
  var resetBtn = document.getElementById("resetBtn");
  var breadcrumb = document.getElementById("breadcrumb");
  var svg, g, simulation, width, height;
  var expandedSection = null;
  var expandedPost = null;
  var clickTimer = null;

  function showTooltip(event, text) {
    tooltip.style.opacity = 1;
    tooltip.textContent = text;
    tooltip.style.left = (event.pageX + 12) + "px";
    tooltip.style.top = (event.pageY - 10) + "px";
  }

  function hideTooltip() { tooltip.style.opacity = 0; }

  function findRelated(post) {
    var related = [];
    allPosts.forEach(function(p) {
      if (p.id === post.id) return;
      var shared = post.tags.filter(function(t) { return p.tags.indexOf(t) >= 0; });
      if (shared.length >= 2) related.push({ post: p, weight: shared.length });
    });
    related.sort(function(a, b) { return b.weight - a.weight; });
    return related.slice(0, 12);
  }

  function renderGraph(visibleNodes, visibleLinks, opts) {
    g.selectAll("*").remove();
    if (simulation) simulation.stop();

    var simNodes = visibleNodes.map(function(n) { return Object.assign({}, n); });
    var simLinks = visibleLinks.map(function(l) { return { source: l.source, target: l.target, weight: l.weight || 1 }; });

    simulation = d3.forceSimulation(simNodes)
      .force("link", d3.forceLink(simLinks).id(function(d) { return d.id; }).distance(opts.linkDist || 80).strength(0.4))
      .force("charge", d3.forceManyBody().strength(opts.charge || -200))
      .force("center", d3.forceCenter(width / 2, height / 2))
      .force("collision", d3.forceCollide().radius(function(d) { return d.radius + 4; }));

    var link = g.append("g").selectAll("line").data(simLinks).join("line")
      .attr("stroke", "var(--border-color, #ddd)")
      .attr("stroke-opacity", 0.4)
      .attr("stroke-width", function(d) { return Math.min((d.weight || 1) * 0.5, 2); });

    var node = g.append("g").selectAll("g").data(simNodes).join("g")
      .style("cursor", "pointer")
      .call(d3.drag()
        .on("start", function(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag", function(event, d) { d.fx = event.x; d.fy = event.y; })
        .on("end", function(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

    node.append("circle")
      .attr("r", function(d) { return d.radius; })
      .attr("fill", function(d) { return d.color; })
      .attr("stroke", "var(--main-bg, #fff)")
      .attr("stroke-width", function(d) { return d.expanded ? 3 : 1.5; });

    if (opts.showLabels) {
      node.append("text")
        .text(function(d) { return d.label || d.title; })
        .attr("dx", function(d) { return d.radius + 5; })
        .attr("dy", ".35em")
        .attr("font-size", function(d) { return d.isSection ? "13px" : "10px"; })
        .attr("font-weight", function(d) { return d.isSection ? "700" : "400"; })
        .attr("fill", "var(--text-color, #333)");
    }

    node.on("mouseover", function(event, d) {
      var hint = d.isSection ? d.label + " (" + (postsBySection[d.id] || []).length + " posts) \u2014 click to expand" : d.title + " \u2014 click to explore, double-click to open";
      showTooltip(event, hint);
      d3.select(this).select("circle").attr("r", d.radius + 3).attr("stroke-width", 2.5);
    })
    .on("mousemove", function(event) {
      tooltip.style.left = (event.pageX + 12) + "px";
      tooltip.style.top = (event.pageY - 10) + "px";
    })
    .on("mouseout", function(event, d) {
      hideTooltip();
      d3.select(this).select("circle").attr("r", d.radius).attr("stroke-width", d.expanded ? 3 : 1.5);
    })
    .on("click", function(event, d) {
      if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; return; }
      clickTimer = setTimeout(function() {
        clickTimer = null;
        if (d.isSection) { expandSection(d.id); }
        else { expandPost(d); }
      }, 250);
    })
    .on("dblclick", function(event, d) {
      if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
      if (!d.isSection) window.location.href = d.url;
    });

    simulation.on("tick", function() {
      link.attr("x1", function(d) { return d.source.x; }).attr("y1", function(d) { return d.source.y; })
          .attr("x2", function(d) { return d.target.x; }).attr("y2", function(d) { return d.target.y; });
      node.attr("transform", function(d) { return "translate(" + d.x + "," + d.y + ")"; });
    });
  }

  function showTopLevel() {
    expandedSection = null;
    expandedPost = null;
    resetBtn.style.display = "none";
    breadcrumb.textContent = "";

    var sectionNodes = Object.keys(postsBySection).map(function(sec) {
      return {
        id: sec,
        title: sectionLabels[sec],
        label: sectionLabels[sec],
        color: colorMap[sec],
        radius: 28,
        isSection: true
      };
    });

    var sectionLinks = [];
    var sectionKeys = Object.keys(postsBySection);
    for (var i = 0; i < sectionKeys.length; i++) {
      for (var j = i + 1; j < sectionKeys.length; j++) {
        sectionLinks.push({ source: sectionKeys[i], target: sectionKeys[j], weight: 1 });
      }
    }

    renderGraph(sectionNodes, sectionLinks, { linkDist: 150, charge: -400, showLabels: true });
  }

  function expandSection(sectionId) {
    expandedSection = sectionId;
    expandedPost = null;
    resetBtn.style.display = "inline-block";
    breadcrumb.textContent = sectionLabels[sectionId];

    var centerNode = {
      id: sectionId,
      title: sectionLabels[sectionId],
      label: sectionLabels[sectionId],
      color: colorMap[sectionId],
      radius: 22,
      isSection: true,
      expanded: true
    };

    var childNodes = (postsBySection[sectionId] || []).map(function(p) {
      return { id: p.id, title: p.title, url: p.url, section: p.section, tags: p.tags, color: p.color, radius: 7 };
    });

    var otherSections = Object.keys(postsBySection).filter(function(s) { return s !== sectionId; }).map(function(sec) {
      return { id: sec, title: sectionLabels[sec], label: sectionLabels[sec], color: colorMap[sec], radius: 16, isSection: true, dimmed: true };
    });

    var allVisible = [centerNode].concat(childNodes).concat(otherSections);

    var visibleLinks = [];
    childNodes.forEach(function(c) {
      visibleLinks.push({ source: sectionId, target: c.id, weight: 1 });
    });

    for (var i = 0; i < childNodes.length; i++) {
      for (var j = i + 1; j < childNodes.length; j++) {
        var shared = childNodes[i].tags.filter(function(t) { return childNodes[j].tags.indexOf(t) >= 0; });
        if (shared.length >= 2) {
          visibleLinks.push({ source: childNodes[i].id, target: childNodes[j].id, weight: shared.length });
        }
      }
    }

    renderGraph(allVisible, visibleLinks, { linkDist: 60, charge: -100, showLabels: true });
  }

  function expandPost(post) {
    expandedPost = post;
    resetBtn.style.display = "inline-block";
    var secLabel = sectionLabels[expandedSection] || sectionLabels[post.section];
    breadcrumb.textContent = secLabel + " \u203a " + post.title;

    var centerNode = { id: post.id, title: post.title, url: post.url, section: post.section, tags: post.tags, color: post.color, radius: 14, expanded: true };

    var related = findRelated(post);
    var relatedNodes = related.map(function(r) {
      return { id: r.post.id, title: r.post.title, url: r.post.url, section: r.post.section, tags: r.post.tags, color: r.post.color, radius: 7 };
    });

    var allVisible = [centerNode].concat(relatedNodes);
    var visibleLinks = related.map(function(r) {
      return { source: post.id, target: r.post.id, weight: r.weight };
    });

    for (var i = 0; i < relatedNodes.length; i++) {
      for (var j = i + 1; j < relatedNodes.length; j++) {
        var shared = relatedNodes[i].tags.filter(function(t) { return relatedNodes[j].tags.indexOf(t) >= 0; });
        if (shared.length >= 2) {
          visibleLinks.push({ source: relatedNodes[i].id, target: relatedNodes[j].id, weight: shared.length });
        }
      }
    }

    renderGraph(allVisible, visibleLinks, { linkDist: 70, charge: -150, showLabels: true });
  }

  window._graphReset = function() {
    if (expandedPost && expandedSection) {
      expandSection(expandedSection);
    } else {
      showTopLevel();
    }
  };

  function initGraph() {
    width = container.clientWidth || 800;
    height = container.clientHeight || 500;

    svg = d3.select("#graph").append("svg").attr("viewBox", [0, 0, width, height]);
    g = svg.append("g");

    svg.call(d3.zoom().scaleExtent([0.3, 4]).on("zoom", function(event) { g.attr("transform", event.transform); }));

    showTopLevel();
  }

  function tryInit() {
    if (container.clientWidth > 0 && container.clientHeight > 0) { initGraph(); }
    else { requestAnimationFrame(tryInit); }
  }
  tryInit();
})();
</script>

<!-- Dark/light mode logo swap -->
<script>
(function() {
  var LIGHT = '/FinBytes/assets/images/logo.png';
  var DARK  = '/FinBytes/assets/images/logo-dark.png';

  function swapLogo() {
    var isDark = document.documentElement.getAttribute('data-mode') === 'dark' ||
      (!document.documentElement.getAttribute('data-mode') &&
       window.matchMedia('(prefers-color-scheme: dark)').matches);
    var src = isDark ? DARK : LIGHT;
    document.querySelectorAll('.sidebar img, #sidebar img, img[src*="logo"]').forEach(function(img) {
      if (img.src.indexOf('logo') !== -1) img.src = src;
    });
    // Also swap favicon
    var fav = document.querySelector('link[rel="icon"]');
    if (fav) fav.href = src;
  }

  // Run on load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', swapLogo);
  } else {
    swapLogo();
  }

  // Watch for theme toggle
  var observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      if (m.attributeName === 'data-mode') swapLogo();
    });
  });
  observer.observe(document.documentElement, { attributes: true });

  // Watch for system preference change
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', swapLogo);
})();
</script>
